name: Zone Console CI

on:
  push:
    paths:
      - "modules/multiplayer_fabric_mmog/tools/zone_console/**"
  pull_request:
    paths:
      - "modules/multiplayer_fabric_mmog/tools/zone_console/**"

concurrency:
  group: zone-console-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: mix test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: modules/multiplayer_fabric_mmog/tools/zone_console

    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.17"
          otp-version: "27"

      - name: Set up Rust (required for Rustler NIF)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Mix deps
        uses: actions/cache@v4
        with:
          path: |
            modules/multiplayer_fabric_mmog/tools/zone_console/deps
            modules/multiplayer_fabric_mmog/tools/zone_console/_build
          key: ${{ runner.os }}-zone-console-mix-${{ hashFiles('modules/multiplayer_fabric_mmog/tools/zone_console/mix.lock') }}
          restore-keys: ${{ runner.os }}-zone-console-mix-

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-zone-console-cargo-${{ hashFiles('modules/multiplayer_fabric_mmog/tools/zone_console/native/keychain_nif/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-zone-console-cargo-

      - name: Install dependencies
        run: mix deps.get

      - name: Compile (builds Rustler NIF)
        run: mix compile --warnings-as-errors

      - name: Check formatting
        run: mix format --check-formatted

      - name: Run tests
        # Tests use ZoneConsole.Keychain.Mock (ETS) — no OS keychain needed.
        # PropCheck runs 100 cases per property by default.
        run: mix test --trace
