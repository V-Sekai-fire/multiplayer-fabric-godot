name: 🐳 Zone Server Docker images

on:
  # Called as a third stage by runner.yml after linux-build completes.
  # Both jobs share the same run_id so download-artifact needs no run-id param.
  workflow_call:
    inputs:
      push-image:
        description: "Push images to ghcr.io"
        type: boolean
        default: true

  # Manual trigger — supply an explicit run-id when Godot was built in a
  # different workflow run.
  workflow_dispatch:
    inputs:
      godot-run-id:
        description: "Run ID holding linux-editor-mono (blank = this run)"
        required: false
        default: ""
      push-image:
        description: "Push to ghcr.io"
        type: boolean
        default: true

permissions:
  contents: read
  packages: write

jobs:
  # ── Image 1: zone-fabric (Godot headless + zone_console) ─────────────────────
  zone-fabric:
    name: Build zone-fabric image
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download linux-editor-mono artifact (same run)
        if: inputs.godot-run-id == '' || inputs.godot-run-id == null
        uses: actions/download-artifact@v4
        with:
          name: linux-editor-mono
          path: godot-bin/

      - name: Download linux-editor-mono artifact (explicit run-id)
        if: inputs.godot-run-id != '' && inputs.godot-run-id != null
        uses: actions/download-artifact@v4
        with:
          name: linux-editor-mono
          run-id: ${{ inputs.godot-run-id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: godot-bin/

      - name: Mark Godot binary executable
        run: chmod +x godot-bin/godot.linuxbsd.editor.x86_64.mono

      - name: Prepare zone-fabric build context
        run: |
          mkdir -p docker-ctx-zone
          cp -r godot-bin docker-ctx-zone/godot-bin
          cp -r modules/multiplayer_fabric_mmog/tools/zone_console \
                docker-ctx-zone/zone_console
          cp .github/docker/Dockerfile.zone-fabric docker-ctx-zone/Dockerfile
          # GodotSharp assemblies are required for the mono runtime to load C# scripts.
          # They are generated by build_assemblies.py and uploaded as part of the artifact.
          if [ -d godot-bin/GodotSharp ]; then
            echo "GodotSharp found in artifact — included in image."
          else
            echo "::warning::GodotSharp not found in artifact — mono C# scripts will fail at runtime."
          fi

      - name: Docker metadata (zone-fabric)
        id: meta-zone
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/zone-fabric
          tags: |
            type=sha,prefix=git-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push zone-fabric
        uses: docker/build-push-action@v6
        with:
          context: docker-ctx-zone
          push: ${{ inputs.push-image }}
          tags: ${{ steps.meta-zone.outputs.tags }}
          labels: ${{ steps.meta-zone.outputs.labels }}
          build-args: ELIXIR_IMAGE=elixir:1.17.3-otp-27
          cache-from: type=gha,scope=zone-fabric
          cache-to: type=gha,scope=zone-fabric,mode=max

  # ── Image 2: uro (Phoenix API server) ────────────────────────────────────────
  uro:
    name: Build uro image
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Prepare uro build context
        run: |
          mkdir -p docker-ctx-uro
          cp -r thirdparty/uro docker-ctx-uro/uro
          cp .github/docker/Dockerfile.uro docker-ctx-uro/Dockerfile

      - name: Docker metadata (uro)
        id: meta-uro
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/uro
          tags: |
            type=sha,prefix=git-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push uro
        uses: docker/build-push-action@v6
        with:
          context: docker-ctx-uro
          push: ${{ inputs.push-image }}
          tags: ${{ steps.meta-uro.outputs.tags }}
          labels: ${{ steps.meta-uro.outputs.labels }}
          build-args: ELIXIR_IMAGE=elixir:1.17.3-otp-27
          cache-from: type=gha,scope=uro
          cache-to: type=gha,scope=uro,mode=max
