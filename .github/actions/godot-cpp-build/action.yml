name: Build godot-cpp
description: Build godot-cpp with the provided options.

inputs:
  bin:
    description: Path to the Godot binary.
    required: true
    type: string
  scons-flags:
    description: Additional SCons flags.
    type: string
  scons-cache:
    description: The SCons cache path.
    default: ${{ github.workspace }}/.scons_cache/
    type: string
  godot-cpp-branch:
    description: The godot-cpp branch.
    default: master
    type: string

runs:
  using: composite
  steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        submodules: recursive
        repository: godotengine/godot-cpp
        ref: ${{ inputs.godot-cpp-branch }}
        path: godot-cpp

    - name: Extract API
      shell: sh
      run: ${{ inputs.bin }} --headless --dump-gdextension-interface --dump-extension-api

    - name: Patch godot-cpp ar for E2BIG workaround
      shell: python3 {0}
      run: |
        import os, textwrap
        # SCons picks up site_scons/site_init.py from the directory where it runs.
        # We put the patch in godot-cpp/test/site_scons/ so it is loaded when
        # scons --directory=./godot-cpp/test is executed.
        site_dir = "godot-cpp/test/site_scons"
        os.makedirs(site_dir, exist_ok=True)
        code = textwrap.dedent("""\
            # Replace the SCons 'ar' tool's generate function with one that
            # uses a Python Action (no shell, no E2BIG) backed by GNU ar @rspfile.
            import SCons.Tool.ar as _ar_mod
            import subprocess, tempfile, os
            from SCons.Script import Action

            _orig_generate = _ar_mod.generate

            def _patched_generate(env):
                _orig_generate(env)

                def _ar_rsp(target, source, env):
                    tp = str(target[0])
                    srcs = [str(s) for s in source]
                    with tempfile.NamedTemporaryFile(
                        mode='w', suffix='.rsp', delete=False
                    ) as f:
                        f.write('\\n'.join(srcs))
                        rsp = f.name
                    try:
                        if os.path.exists(tp):
                            os.unlink(tp)
                        subprocess.run(
                            ['/usr/bin/ar', 'rc', tp, '@' + rsp], check=True
                        )
                    finally:
                        os.unlink(rsp)
                    return 0

                env.Replace(ARCOM=Action(_ar_rsp, 'Archiving $TARGET'))

            _ar_mod.generate = _patched_generate
        """)
        with open(f"{site_dir}/site_init.py", "w") as f:
            f.write(code)

    - name: SCons Build
      shell: bash
      env:
        SCONS_CACHE: ${{ inputs.scons-cache }}
      run: scons --directory=./godot-cpp/test "gdextension_dir=${{ github.workspace }}" ${{ inputs.scons-flags }}
