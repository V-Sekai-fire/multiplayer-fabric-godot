name: Build godot-cpp
description: Build godot-cpp with the provided options.

inputs:
  bin:
    description: Path to the Godot binary.
    required: true
    type: string
  scons-flags:
    description: Additional SCons flags.
    type: string
  scons-cache:
    description: The SCons cache path.
    default: ${{ github.workspace }}/.scons_cache/
    type: string
  godot-cpp-branch:
    description: The godot-cpp branch.
    default: master
    type: string

runs:
  using: composite
  steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        submodules: recursive
        repository: godotengine/godot-cpp
        ref: ${{ inputs.godot-cpp-branch }}
        path: godot-cpp

    - name: Extract API
      shell: sh
      run: ${{ inputs.bin }} --headless --dump-gdextension-interface --dump-extension-api

    - name: SCons Build
      shell: bash
      env:
        SCONS_CACHE: ${{ inputs.scons-cache }}
      run: |
        # GNU ar supports @file response files (binutils >= 2.25).
        # Without this wrapper, archiving godot-cpp fails with E2BIG when
        # the object-file list exceeds ARG_MAX.
        cat > /tmp/ar_rsp << 'WRAPPER_EOF'
        #!/bin/bash
        op="$1"; target="$2"; shift 2
        rsp=$(mktemp /tmp/ar_sources_XXXXXX)
        printf '%s\n' "$@" > "$rsp"
        /usr/bin/ar "$op" "$target" @"$rsp"
        rm "$rsp"
        WRAPPER_EOF
        chmod +x /tmp/ar_rsp
        scons --directory=./godot-cpp/test "gdextension_dir=${{ github.workspace }}" ${{ inputs.scons-flags }} AR=/tmp/ar_rsp
